name: Update rental notices and deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "10 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: rental-notice-pages
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: collector/requirements.txt

      - name: Install collector dependencies
        run: pip install -r collector/requirements.txt

      - name: Collect official notices
        continue-on-error: true
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
        run: python collector/main.py --output data/notices.json

      - name: Verify data file
        run: python -m json.tool data/notices.json > /dev/null

      - name: Commit changed notice data
        run: |
          if git diff --quiet -- data/notices.json; then
            echo "No notice changes"
            exit 0
          fi
          git config user.name "rental-notice-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/notices.json
          git commit -m "chore: update rental notices"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy GitHub Pages
        uses: actions/deploy-pages@v4
